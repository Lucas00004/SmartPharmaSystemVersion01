services:
  ai-service:
    build:
      context: ./ai-service
    container_name: smartpharma_ai
    environment:
      DATABASE_URL: mysql+pymysql://root@host.docker.internal:3306/pharmacymanagement
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    build:
      context: ./backend
    container_name: smartpharma_backend
    environment:
      PORT: 5000
      DB_HOST: host.docker.internal
      DB_USER: root
      DB_PASS: ""
      DB_NAME: pharmacymanagement
      DB_PORT: 3306
      SESSION_SECRET: smartpharma_local_secret
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend/spsver1
    container_name: smartpharma_frontend
    ports:
      - "3000:3000"
    depends_on:
      - ai-service
      - backend
